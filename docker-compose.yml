services:
  # The Vector Engine
  qdrant:
    image: qdrant/qdrant:latest
    container_name: hp_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage:z
    restart: always

  # The Relational Engine (for Chat History/Users)
  postgres:
    image: postgres:16-alpine
    container_name: hp_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hp_rag_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    restart: always

  # Optional: pgAdmin to easily look at your Postgres data
  pgadmin:
    image: dpage/pgadmin4
    container_name: hp_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@hp.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres